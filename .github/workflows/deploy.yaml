name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Убедись, что ветка совпадает (main или master)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Static Site
        # Здесь мы явно форсируем режим экспорта через переменную
        run: BUILD_MODE=export npm run build

      - name: Debug Folders (Проверка папок)
        # Этот шаг покажет в логах, где на самом деле лежат файлы
        run: |
          echo "Checking directory structure..."
          ls -R

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Если папка out точно есть, берем её. 
          # Если Next.js почему-то сложил всё в другое место, логи выше это покажут.
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
